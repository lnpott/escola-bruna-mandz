    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0b0c;

        }
        h1, h2, h3 { font-family: 'Montserrat', sans-serif; }

<body class="bg-zinc-950 text-zinc-100 antialiased min-h-screen flex flex-col justify-between">

<!-- HEADER -->
<header class="sticky top-0 z-50 bg-zinc-950/95 backdrop-blur-md border-b border-zinc-900 px-4 py-3 sm:px-8">
    <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
        <a href="#" class="flex items-center gap-3 group">
            <img src="logo.png" class="h-10">
            <img src="LOGOBRANCOPQNO.png" class="h-10">
        </a>
    </div>
</header>

<div id="toast" class="fixed bottom-6 right-6 z-50"></div>

<!-- ================= AUDIO ENGINE ================= -->
<script>
const piano = new Tone.Sampler({
    urls: {
        "C4": "https://tonejs.github.io/audio/salamander/C4.mp3",
        "D#4": "https://tonejs.github.io/audio/salamander/Ds4.mp3",
        "F#4": "https://tonejs.github.io/audio/salamander/Fs4.mp3",
        "A4": "https://tonejs.github.io/audio/salamander/A4.mp3",
        "C5": "https://tonejs.github.io/audio/salamander/C5.mp3"
    },
    release: 1
}).toDestination();

let audioReady = false;

async function initAudio(){
    if(!audioReady){
        await Tone.start();
        await Tone.loaded();
        audioReady = true;
    }
}

function freqToNote(freq){
    const A4 = 440;
    const semitone = 12 * Math.log2(freq/A4);
    const n = Math.round(semitone)+69;
    const notes=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
    return notes[n%12]+Math.floor(n/12-1);
}

window.playKey = async function(freq,note){
    await initAudio();
    const n = note || freqToNote(freq);
    piano.triggerAttackRelease(n,"2n");
    if(typeof showToast==="function") showToast("🎹 "+n);
};
</script>

<script src="game.js"></script>

</body>
</html>
