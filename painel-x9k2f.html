<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="robots" content="noindex, nofollow" />
        <link rel="icon" type="image/png" href="/LOGOPRETO.png" />
        <title>Painel — Loja Oficial</title>
        <link rel="stylesheet" href="store/store-style.css" />
        <style>
            body { background: #09090b; color: #e4e4e7; font-family: system-ui, sans-serif; }
            .panel-wrap { max-width: 1200px; margin: 0 auto; padding: 32px 20px 80px; }
            .login-box { max-width: 360px; margin: 80px auto; background: #18181b; border: 1px solid #27272a; border-radius: 16px; padding: 28px; }
            .login-box input { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #3f3f46; background: #09090b; color: #fff; margin: 10px 0; }
            .login-box button { width: 100%; padding: 10px; border-radius: 8px; border: none; background: #dc2626; color: #fff; font-weight: 700; cursor: pointer; }
            .login-error { color: #f87171; font-size: 12px; margin-top: 6px; min-height: 16px; }

            /* KPIs */
            .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin: 20px 0 24px; }
            .kpi-card { background: #18181b; border: 1px solid #27272a; border-radius: 12px; padding: 16px; }
            .kpi-label { color: #71717a; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; }
            .kpi-value { font-size: 24px; font-weight: 900; margin-top: 4px; color: #fff; }
            .kpi-value.warn { color: #fcd34d; }
            .kpi-value.good { color: #86efac; }

            /* Toolbar */
            .toolbar { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
            .toolbar-left { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
            .toolbar-actions { display: flex; gap: 8px; flex-wrap: wrap; }
            .toolbar button { padding: 8px 14px; border-radius: 8px; border: 1px solid #3f3f46; background: #18181b; color: #e4e4e7; cursor: pointer; font-size: 13px; }
            .toolbar button:hover { background: #27272a; }
            .btn-danger { border-color: #dc2626 !important; color: #f87171 !important; }
            .btn-danger:hover { background: #1a0a0a !important; }

            /* Contador de auto-refresh */
            #refresh-counter { font-size: 12px; color: #52525b; white-space: nowrap; }
            #refresh-counter span { color: #a1a1aa; font-weight: 700; }

            /* Filtros */
            .filters-bar { display: flex; gap: 10px; margin: 16px 0; flex-wrap: wrap; }
            .filters-bar input, .filters-bar select { padding: 8px 12px; border-radius: 8px; border: 1px solid #3f3f46; background: #18181b; color: #e4e4e7; font-size: 13px; }
            .filters-bar input { flex: 1; min-width: 200px; }

            /* Tabela */
            table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 12px; }
            th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #27272a; vertical-align: top; }
            th { color: #a1a1aa; text-transform: uppercase; font-size: 11px; letter-spacing: 0.05em; }
            .status-pill { padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 700; white-space: nowrap; }
            .status-approved { background: #14532d; color: #86efac; }
            .status-pending { background: #422006; color: #fcd34d; }
            .status-rejected, .status-cancelled { background: #450a0a; color: #fca5a5; }
            .status-refunded { background: #1e293b; color: #93c5fd; }
            .status-select { padding: 4px 8px; border-radius: 6px; border: 1px solid #3f3f46; background: #09090b; color: #e4e4e7; font-size: 12px; }
            .row-saving { opacity: 0.5; pointer-events: none; }
            .empty-state { text-align: center; padding: 40px; color: #71717a; }

            /* Highlight de pedidos novos (últimos 5 min) */
            tr.row-new td { background: #0f1f0f !important; }
            tr.row-new td:first-child { border-left: 3px solid #22c55e; }
            .badge-new { display: inline-block; background: #14532d; color: #86efac; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 999px; margin-left: 6px; vertical-align: middle; }

            /* Linha de detalhe expandido */
            tr.detail-row td { background: #111113; padding: 12px 16px; }
            tr.detail-row { display: none; }
            tr.detail-row.open { display: table-row; }
            .detail-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
            .detail-section h4 { font-size: 11px; text-transform: uppercase; color: #52525b; letter-spacing: .05em; margin: 0 0 8px; }
            .detail-items { list-style: none; padding: 0; margin: 0; }
            .detail-items li { font-size: 13px; color: #a1a1aa; padding: 3px 0; border-bottom: 1px solid #1f1f22; }
            .detail-items li:last-child { border-bottom: none; }
            .expand-btn { background: none; border: none; color: #52525b; cursor: pointer; font-size: 12px; padding: 0; }
            .expand-btn:hover { color: #a1a1aa; }

            /* Botão verificar no MP */
            .btn-mp { background: none; border: 1px solid #3f3f46; color: #a1a1aa; border-radius: 6px; padding: 3px 8px; font-size: 11px; cursor: pointer; white-space: nowrap; }
            .btn-mp:hover { border-color: #009ee3; color: #009ee3; }
            .mp-result { font-size: 11px; margin-top: 6px; padding: 6px 10px; border-radius: 6px; background: #18181b; border: 1px solid #27272a; }
            .mp-result.ok { border-color: #22c55e; color: #86efac; }
            .mp-result.err { border-color: #dc2626; color: #fca5a5; }

            /* Tabs de navegação */
            .nav-tabs { display: flex; gap: 4px; margin-bottom: 24px; border-bottom: 1px solid #27272a; padding-bottom: 0; }
            .nav-tab { padding: 8px 18px; border-radius: 8px 8px 0 0; border: 1px solid transparent; border-bottom: none; background: none; color: #71717a; cursor: pointer; font-size: 13px; font-weight: 600; position: relative; bottom: -1px; }
            .nav-tab:hover { color: #a1a1aa; }
            .nav-tab.active { background: #18181b; border-color: #27272a; color: #e4e4e7; }

            /* Aba Produtos */
            .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; margin-top: 12px; }
            .products-toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin: 8px 0 4px; }
            .products-toolbar input, .products-toolbar select { padding: 8px 10px; border-radius: 8px; border: 1px solid #3f3f46; background: #18181b; color: #e4e4e7; font-size: 13px; }
            .products-toolbar input { flex: 1; min-width: 220px; }
            .products-toolbar select { min-width: 140px; }
            .products-summary { color: #71717a; font-size: 12px; margin-left: auto; }
            .product-admin-card { background: #18181b; border: 1px solid #27272a; border-radius: 12px; padding: 16px; display: flex; gap: 14px; align-items: flex-start; width: 100%; box-sizing: border-box; }
            .product-admin-card.inactive { opacity: 0.65; }
            .product-admin-card.saving { border-color: #dc2626; box-shadow: inset 0 0 0 1px rgba(220,38,38,.25); }
            .product-admin-img { width: 72px; height: 72px; object-fit: cover; border-radius: 8px; border: 1px solid #27272a; flex-shrink: 0; }
            .product-admin-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 8px; overflow-wrap: anywhere; }
            .product-admin-name { font-weight: 700; font-size: 14px; line-height: 1.35; margin-bottom: 0; white-space: normal; overflow: visible; text-overflow: clip; }
            .product-admin-cat { font-size: 11px; color: #71717a; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 0; line-height: 1.4; }
            .product-admin-fields { display: flex; flex-direction: column; gap: 8px; }
            .field-row { display: flex; align-items: flex-start; gap: 8px; flex-wrap: wrap; }
            .field-label { font-size: 11px; color: #71717a; width: 72px; flex-shrink: 0; margin-top: 6px; }
            .field-input { flex: 1; min-width: 0; padding: 4px 8px; border-radius: 6px; border: 1px solid #3f3f46; background: #09090b; color: #e4e4e7; font-size: 13px; }
            .field-input:focus { outline: none; border-color: #dc2626; }
            .field-textarea { width: 100%; min-height: 76px; resize: vertical; padding: 6px 8px; border-radius: 6px; border: 1px solid #3f3f46; background: #09090b; color: #e4e4e7; font-size: 13px; box-sizing: border-box; }
            .field-select { flex: 1; min-width: 0; padding: 4px 8px; border-radius: 6px; border: 1px solid #3f3f46; background: #09090b; color: #e4e4e7; font-size: 13px; }
            .toggle-active { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 12px; color: #a1a1aa; margin-top: 2px; }
            .toggle-active input[type="checkbox"] { accent-color: #dc2626; width: 14px; height: 14px; cursor: pointer; }
            .btn-save-product { margin-top: 10px; width: 100%; padding: 6px; border-radius: 6px; border: none; background: #dc2626; color: #fff; font-weight: 700; font-size: 12px; cursor: pointer; }
            .btn-save-product:hover { background: #b91c1c; }
            .btn-save-product:disabled { opacity: 0.5; cursor: not-allowed; }
            .btn-save-product.saved { background: #166534; }
            .save-result { font-size: 11px; margin-top: 4px; text-align: center; min-height: 14px; }
            .save-result.ok  { color: #86efac; }
            .save-result.err { color: #fca5a5; }

            /* Toast */
            .toast { position: fixed; bottom: 20px; right: 20px; background: #18181b; border: 1px solid #3f3f46; color: #e4e4e7; padding: 10px 16px; border-radius: 10px; font-size: 13px; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,.5); }

            /* Mobile */
            @media (max-width: 720px) {
                .panel-wrap { padding: 16px 12px 60px; }
                .kpi-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
                .kpi-card { padding: 12px; }
                .kpi-value { font-size: 18px; }
                .toolbar { flex-direction: column; align-items: stretch; }
                .toolbar-actions { width: 100%; }
                .toolbar-actions button { flex: 1; }
                .filters-bar { flex-direction: column; }
                .filters-bar input, .filters-bar select { width: 100%; }
                table, thead { display: none; }
                tbody { display: block; }
                tr { display: block; background: #18181b; border: 1px solid #27272a; border-radius: 12px; padding: 12px; margin-bottom: 10px; }
                tr.row-new { border-left: 3px solid #22c55e; }
                tr.detail-row { display: none !important; }
                td { display: flex; justify-content: space-between; align-items: center; gap: 10px; border: none; padding: 6px 0; text-align: right; }
                td::before { content: attr(data-label); color: #71717a; font-size: 11px; text-transform: uppercase; font-weight: 700; flex-shrink: 0; text-align: left; }
                td[data-label='Cliente'] { align-items: flex-start; text-align: right; }
                td[data-label='Ação'] .status-select { width: 100%; }
                .detail-inner { grid-template-columns: 1fr; }
                .product-admin-card { flex-direction: column; }
                .product-admin-img { width: 100%; height: 160px; }
                .products-toolbar { flex-direction: column; align-items: stretch; }
                .products-summary { margin-left: 0; }
            }
        </style>
    </head>
    <body>

        <!-- LOGIN -->
        <div id="login-screen" class="login-box">
            <h2 style="margin:0 0 4px">Painel — Loja Oficial</h2>
            <p style="color:#a1a1aa;font-size:13px">Acesso restrito.</p>
            <input id="admin-password-input" type="password" placeholder="Senha" autocomplete="current-password" />
            <div id="login-error" class="login-error"></div>
            <button id="login-submit">Entrar</button>
        </div>

        <!-- PAINEL -->
        <div id="panel-screen" class="panel-wrap" style="display:none">
            <div class="toolbar">
                <div class="toolbar-left">
                    <h1 style="font-size:20px">Loja Bruna Mandz</h1>
                    <span id="refresh-counter"></span>
                </div>
                <div class="toolbar-actions">
                    <button id="export-csv-btn">⬇ Exportar CSV</button>
                    <button id="refresh-btn">↻ Atualizar</button>
                    <button id="logout-btn" class="btn-danger">Sair</button>
                </div>
            </div>

            <!-- TABS -->
            <div class="nav-tabs">
                <button class="nav-tab active" data-tab="orders">🧾 Pedidos</button>
                <button class="nav-tab" data-tab="products">📦 Produtos</button>
            </div>

            <!-- ABA PEDIDOS -->
            <div id="tab-orders">
                <div class="kpi-grid" id="kpi-grid"></div>
                <div class="filters-bar">
                    <input id="search-input" type="text" placeholder="Buscar por nome, e-mail ou ID do pedido…" />
                    <select id="status-filter">
                        <option value="">Todos os status</option>
                        <option value="pending">Pendente</option>
                        <option value="approved">Aprovado</option>
                        <option value="rejected">Rejeitado</option>
                        <option value="cancelled">Cancelado</option>
                        <option value="refunded">Devolvido</option>
                    </select>
                </div>
                <div id="orders-area"></div>
            </div>

            <!-- ABA PRODUTOS -->
            <div id="tab-products" style="display:none">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px;">
                    <p style="color:#71717a;font-size:13px">Edite preço, estoque e visibilidade de cada produto. As alterações refletem na loja imediatamente.</p>
                </div>
                <div class="products-toolbar">
                    <input id="product-search-input" type="text" placeholder="Buscar produto por nome ou descrição…" />
                    <select id="product-category-filter">
                        <option value="">Todas as categorias</option>
                        <option value="roupas">Roupas</option>
                        <option value="acessorios">Acessórios</option>
                        <option value="kits">Kits</option>
                    </select>
                    <select id="product-status-filter">
                        <option value="">Todos</option>
                        <option value="active">Ativos</option>
                        <option value="inactive">Inativos</option>
                    </select>
                    <div id="products-summary" class="products-summary"></div>
                </div>
                <div id="products-area"><div class="empty-state">Carregando produtos…</div></div>
            </div>
        </div>

        <script>
            const money      = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });
            const STORAGE_KEY = 'bruna_admin_session';
            const NEW_THRESHOLD_MS = 5 * 60 * 1000; // 5 minutos
            const REFRESH_INTERVAL = 60;             // segundos

            const STATUS_LABELS = { approved:'Aprovado', pending:'Pendente', rejected:'Rejeitado', cancelled:'Cancelado', refunded:'Devolvido' };

            const loginScreen  = document.getElementById('login-screen');
            const panelScreen  = document.getElementById('panel-screen');
            const ordersArea   = document.getElementById('orders-area');
            const loginError   = document.getElementById('login-error');
            const kpiGrid      = document.getElementById('kpi-grid');
            const searchInput  = document.getElementById('search-input');
            const statusFilter = document.getElementById('status-filter');
            const refreshCounter = document.getElementById('refresh-counter');

            let _allOrders  = [];
            let _allProducts = [];
            let _password   = null;
            let _activeTab  = 'orders';
            let _productFilters = { search: '', category: '', status: '' };
            let _countdown  = REFRESH_INTERVAL;
            let _timer      = null;
            let _expandedRows = new Set(); // IDs de pedidos com detalhe aberto

            const statusLabel = s => STATUS_LABELS[s] || s;
            const isNew = o => (Date.now() - new Date(o.created_at).getTime()) < NEW_THRESHOLD_MS;

            function showToast(msg) {
                const el = document.createElement('div');
                el.className = 'toast';
                el.textContent = msg;
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 3000);
            }

            // ── Navegação entre abas ────────────────────────────────────────────────

            function switchTab(tab) {
                _activeTab = tab;
                document.getElementById('tab-orders').style.display   = tab === 'orders'   ? '' : 'none';
                document.getElementById('tab-products').style.display = tab === 'products' ? '' : 'none';
                document.getElementById('export-csv-btn').style.display = tab === 'orders' ? '' : 'none';
                document.querySelectorAll('.nav-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
                if (tab === 'products' && !_allProducts.length) loadProducts();
            }

            document.querySelectorAll('.nav-tab').forEach(btn => {
                btn.addEventListener('click', () => switchTab(btn.dataset.tab));
            });

            // ── APIs ──────────────────────────────────────────────────────────────

            async function fetchOrders(password) {
                const res = await fetch('/api/admin-orders', { headers: { 'x-admin-password': password } });
                if (res.status === 401) throw new Error('Senha incorreta.');
                if (!res.ok) {
                    const text = await res.text();
                    throw new Error(text || 'Erro ao buscar pedidos.');
                }
                return res.json();
            }

            async function updateOrderStatus(orderId, status) {
                // Corrigido: a API api/update-order-status.js exige método POST
                // (não PATCH) e o campo "status" no corpo (não "newStatus").
                const res = await fetch('/api/update-order-status', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-admin-password': _password },
                    body: JSON.stringify({ orderId, status }),
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Erro ao atualizar status.');
                return data.order;
            }

            async function verifyMpPayment(mpPaymentId, container) {
                container.innerHTML = '<span style="color:#52525b">Consultando MP…</span>';
                try {
                    const res = await fetch(`/api/verify-mp-payment?mpPaymentId=${mpPaymentId}`, {
                        headers: { 'x-admin-password': _password },
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Erro');
                    const approved = data.dateApproved ? new Date(data.dateApproved).toLocaleString('pt-BR') : '—';
                    container.className = 'mp-result ok';
                    container.innerHTML = `
                        <strong>Status MP:</strong> ${data.status} (${data.statusDetail})<br>
                        <strong>Valor:</strong> ${money.format(data.amount)}<br>
                        <strong>Método:</strong> ${data.method}<br>
                        <strong>Aprovado em:</strong> ${approved}
                    `;
                } catch (e) {
                    container.className = 'mp-result err';
                    container.textContent = '❌ ' + e.message;
                }
            }

            // ── KPIs ──────────────────────────────────────────────────────────────

            function isSameDay(dateStr, ref) {
                const d = new Date(dateStr);
                return d.getFullYear()===ref.getFullYear() && d.getMonth()===ref.getMonth() && d.getDate()===ref.getDate();
            }
            function isSameMonth(dateStr, ref) {
                const d = new Date(dateStr);
                return d.getFullYear()===ref.getFullYear() && d.getMonth()===ref.getMonth();
            }

            function renderKpis(orders) {
                const now      = new Date();
                const approved = orders.filter(o => o.status === 'approved');
                const today    = approved.filter(o => isSameDay(o.created_at, now)).reduce((s,o)=>s+Number(o.total),0);
                const month    = approved.filter(o => isSameMonth(o.created_at, now)).reduce((s,o)=>s+Number(o.total),0);
                const pending  = orders.filter(o => o.status === 'pending').length;
                kpiGrid.innerHTML = `
                    <div class="kpi-card"><div class="kpi-label">Receita Hoje</div><div class="kpi-value good">${money.format(today)}</div></div>
                    <div class="kpi-card"><div class="kpi-label">Receita do Mês</div><div class="kpi-value good">${money.format(month)}</div></div>
                    <div class="kpi-card"><div class="kpi-label">Pedidos Pendentes</div><div class="kpi-value ${pending>0?'warn':''}">${pending}</div></div>
                    <div class="kpi-card"><div class="kpi-label">Total de Pedidos</div><div class="kpi-value">${orders.length}</div></div>`;
            }

            // ── Filtro ────────────────────────────────────────────────────────────

            function getFiltered() {
                const q = searchInput.value.trim().toLowerCase();
                const s = statusFilter.value;
                return _allOrders.filter(o => {
                    if (s && o.status !== s) return false;
                    if (!q) return true;
                    return [o.id, o.customer_name, o.customer_email].filter(Boolean).join(' ').toLowerCase().includes(q);
                });
            }

            // ── Renderização ──────────────────────────────────────────────────────

            function renderOrders(orders) {
                if (!orders.length) {
                    ordersArea.innerHTML = '<div class="empty-state">Nenhum pedido encontrado.</div>';
                    return;
                }

                const rows = orders.map(o => {
                    const novinho   = isNew(o);
                    const expanded  = _expandedRows.has(o.id);
                    const mpId      = o.mp_payment_id || '';

                    // Itens do pedido para o detalhe expandido
                    const itemsList = Array.isArray(o.items) && o.items.length
                        ? o.items.map(i => `<li>${i.name||i.id}${i.quantity>1?` ×${i.quantity}`:''}${i.variant?` <em>(${i.variant})</em>`:''}</li>`).join('')
                        : '<li style="color:#52525b">Sem itens registrados</li>';

                    return `
                    <tr data-order-row="${o.id}" class="${novinho?'row-new':''}">
                        <td data-label="Pedido">
                            <button class="expand-btn" data-expand="${o.id}" title="Ver itens">${expanded?'▼':'▶'}</button>
                            <strong> ${o.id}</strong>
                            ${novinho?'<span class="badge-new">NOVO</span>':''}
                        </td>
                        <td data-label="Data">${new Date(o.created_at).toLocaleString('pt-BR')}</td>
                        <td data-label="Cliente">${o.customer_name||'—'}<br><span style="color:#71717a">${o.customer_email||''}</span></td>
                        <td data-label="Método">${(o.method||'').toUpperCase()}</td>
                        <td data-label="Total">${money.format(o.total)}</td>
                        <td data-label="Status"><span class="status-pill status-${o.status}">${statusLabel(o.status)}</span></td>
                        <td data-label="XP">+${o.earned_xp||0}</td>
                        <td data-label="Ação">
                            <select class="status-select" data-order-id="${o.id}">
                                ${Object.keys(STATUS_LABELS).map(s=>`<option value="${s}"${s===o.status?' selected':''}>${STATUS_LABELS[s]}</option>`).join('')}
                            </select>
                        </td>
                    </tr>
                    <tr class="detail-row${expanded?' open':''}" data-detail-for="${o.id}">
                        <td colspan="8">
                            <div class="detail-inner">
                                <div class="detail-section">
                                    <h4>Itens do pedido</h4>
                                    <ul class="detail-items">${itemsList}</ul>
                                </div>
                                <div class="detail-section">
                                    <h4>Verificar no Mercado Pago</h4>
                                    ${mpId
                                        ? `<button class="btn-mp" data-mp-id="${mpId}" data-mp-container="mp-${o.id}">🔍 Consultar status real (ID: ${mpId})</button>
                                           <div id="mp-${o.id}" class="mp-result" style="display:none"></div>`
                                        : '<span style="color:#52525b;font-size:12px">ID do MP não registrado neste pedido.</span>'
                                    }
                                </div>
                            </div>
                        </td>
                    </tr>`;
                }).join('');

                ordersArea.innerHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>Pedido</th><th>Data</th><th>Cliente</th><th>Método</th>
                                <th>Total</th><th>Status</th><th>XP</th><th>Ação</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>`;

                // Expandir/recolher detalhe
                ordersArea.querySelectorAll('.expand-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const id      = btn.dataset.expand;
                        const detail  = ordersArea.querySelector(`[data-detail-for="${id}"]`);
                        const isOpen  = detail.classList.contains('open');
                        if (isOpen) { _expandedRows.delete(id); } else { _expandedRows.add(id); }
                        detail.classList.toggle('open', !isOpen);
                        btn.textContent = isOpen ? '▶' : '▼';
                    });
                });

                // Botão verificar no MP
                ordersArea.querySelectorAll('.btn-mp').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const container = document.getElementById(btn.dataset.mpContainer);
                        container.style.display = 'block';
                        verifyMpPayment(btn.dataset.mpId, container);
                    });
                });

                // Alterar status
                ordersArea.querySelectorAll('.status-select').forEach(select => {
                    select.addEventListener('change', async e => {
                        const orderId   = e.target.dataset.orderId;
                        const newStatus = e.target.value;
                        const row       = ordersArea.querySelector(`[data-order-row="${orderId}"]`);
                        row?.classList.add('row-saving');
                        try {
                            const updated = await updateOrderStatus(orderId, newStatus);
                            const idx = _allOrders.findIndex(o => o.id === orderId);
                            if (idx !== -1 && updated) _allOrders[idx] = { ..._allOrders[idx], status: newStatus };
                            showToast(`Pedido ${orderId} → "${statusLabel(newStatus)}"`);
                            renderKpis(_allOrders);
                            renderOrders(getFiltered());
                        } catch (err) {
                            showToast('Erro: ' + err.message);
                            row?.classList.remove('row-saving');
                        }
                    });
                });
            }

            function applyFiltersAndRender() { renderOrders(getFiltered()); }

            // ── CSV ───────────────────────────────────────────────────────────────

            function exportCsv() {
                const orders = getFiltered();
                if (!orders.length) { showToast('Nenhum pedido para exportar.'); return; }
                const header = ['ID','Data','Cliente','E-mail','Telefone','Método','Total','Status','XP'];
                const rows   = orders.map(o => [
                    o.id, new Date(o.created_at).toLocaleString('pt-BR'),
                    o.customer_name||'', o.customer_email||'', o.customer_phone||'',
                    (o.method||'').toUpperCase(), Number(o.total).toFixed(2).replace('.',','),
                    statusLabel(o.status), o.earned_xp||0,
                ]);
                const csv  = [header,...rows].map(l=>l.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(';')).join('\r\n');
                const blob = new Blob(['\ufeff'+csv], { type:'text/csv;charset=utf-8;' });
                const url  = URL.createObjectURL(blob);
                const a    = Object.assign(document.createElement('a'), { href:url, download:`pedidos-bruna-mandz-${new Date().toISOString().slice(0,10)}.csv` });
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast('✅ CSV exportado!');
            }


            // ── Produtos (Fase C) ─────────────────────────────────────────────────────

            async function fetchProducts() {
                const res = await fetch('/api/admin-products', { headers: { 'x-admin-password': _password } });
                if (!res.ok) throw new Error('Erro ao buscar produtos.');
                return res.json();
            }

            async function saveProduct(id, fields, card) {
                const btn    = card.querySelector('.btn-save-product');
                const result = card.querySelector('.save-result');
                btn.disabled = true;
                btn.textContent = 'Salvando…';
                card.classList.add('saving');
                result.textContent = '';
                result.className = 'save-result';
                try {
                    const res = await fetch('/api/admin-products', {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json', 'x-admin-password': _password },
                        body: JSON.stringify({ id, ...fields }),
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Erro ao salvar.');
                    const idx = _allProducts.findIndex(p => p.id === id);
                    if (idx !== -1) _allProducts[idx] = data.product;
                    card.classList.toggle('inactive', !data.product.active);
                    btn.textContent = 'Salvo!';
                    btn.classList.add('saved');
                    result.textContent = '✅ Alterações salvas.';
                    result.className = 'save-result ok';
                    renderProductsTab();
                } catch (err) {
                    result.textContent = '❌ ' + err.message;
                    result.className = 'save-result err';
                    btn.textContent = 'Tentar novamente';
                } finally {
                    btn.disabled = false;
                    card.classList.remove('saving');
                    setTimeout(() => {
                        btn.classList.remove('saved');
                        btn.textContent = 'Salvar alterações';
                        result.textContent = '';
                        result.className = 'save-result';
                    }, 2500);
                }
            }

            function getFilteredProducts() {
                const term = _productFilters.search.trim().toLowerCase();
                return _allProducts.filter((p) => {
                    const matchesSearch = !term || [p.name, p.description, p.category, p.badge].filter(Boolean).join(' ').toLowerCase().includes(term);
                    const matchesCategory = !_productFilters.category || p.category === _productFilters.category;
                    const matchesStatus = !_productFilters.status || (_productFilters.status === 'active' ? p.active : !p.active);
                    return matchesSearch && matchesCategory && matchesStatus;
                });
            }

            function renderProductsTab() {
                const area = document.getElementById('products-area');
                const summary = document.getElementById('products-summary');
                const filtered = getFilteredProducts();
                if (!filtered.length) {
                    area.innerHTML = '<div class="empty-state">Nenhum produto encontrado com esses filtros.</div>';
                    if (summary) summary.textContent = '0 de ' + _allProducts.length + ' produtos';
                    return;
                }
                const catLabel = c => ({ roupas: 'Roupas', acessorios: 'Acessórios', kits: 'Kits' }[c] || c);
                area.innerHTML = '<div class="products-grid">' + filtered.map(p => `
                    <div class="product-admin-card${p.active ? '' : ' inactive'}" data-product-id="${p.id}">
                        <img class="product-admin-img" src="${p.image}" alt="${p.name}" onerror="this.style.opacity='.2'" />
                        <div class="product-admin-info">
                            <div class="product-admin-name" title="${p.name}">${p.name}</div>
                            <div class="product-admin-cat">${catLabel(p.category)}</div>
                            <div class="product-admin-fields">
                                <div class="field-row">
                                    <span class="field-label">Nome</span>
                                    <input class="field-input" type="text" data-field="name" value="${p.name || ''}" />
                                </div>
                                <div class="field-row">
                                    <span class="field-label">Descrição</span>
                                </div>
                                <textarea class="field-textarea" data-field="description">${p.description || ''}</textarea>
                                <div class="field-row">
                                    <span class="field-label">Preço</span>
                                    <input class="field-input" type="number" step="0.01" min="0"
                                        data-field="price" value="${Number(p.price).toFixed(2)}" />
                                </div>
                                <div class="field-row">
                                    <span class="field-label">Estoque</span>
                                    <input class="field-input" type="number" step="1" min="0"
                                        data-field="stock" value="${p.stock}" />
                                </div>
                                <div class="field-row">
                                    <span class="field-label">Categoria</span>
                                    <select class="field-select" data-field="category">
                                        ${['roupas','acessorios','kits'].map(c => `<option value="${c}" ${p.category===c?'selected':''}>${catLabel(c)}</option>`).join('')}
                                    </select>
                                </div>
                                <div class="field-row">
                                    <span class="field-label">Badge</span>
                                    <input class="field-input" type="text" placeholder="Novidade, Premium…"
                                        data-field="badge" value="${p.badge || ''}" />
                                </div>
                                <div class="field-row">
                                    <span class="field-label">Imagem</span>
                                    <input class="field-input" type="text" placeholder="/imagem.png"
                                        data-field="image" value="${p.image || ''}" />
                                </div>
                                <label class="toggle-active">
                                    <input type="checkbox" data-field="active" ${p.active ? 'checked' : ''} />
                                    Produto ativo (visível na loja)
                                </label>
                            </div>
                            <button class="btn-save-product">Salvar alterações</button>
                            <div class="save-result"></div>
                        </div>
                    </div>`).join('') + '</div>';

                if (summary) summary.textContent = filtered.length + ' de ' + _allProducts.length + ' produtos';

                area.querySelectorAll('.product-admin-card').forEach(card => {
                    card.querySelector('.btn-save-product').addEventListener('click', () => {
                        const id = card.dataset.productId;
                        const fields = {
                            name: card.querySelector('[data-field="name"]').value.trim(),
                            description: card.querySelector('[data-field="description"]').value.trim(),
                            price: Number(card.querySelector('[data-field="price"]').value),
                            stock: Number(card.querySelector('[data-field="stock"]').value),
                            category: card.querySelector('[data-field="category"]').value,
                            badge: card.querySelector('[data-field="badge"]').value.trim() || null,
                            image: card.querySelector('[data-field="image"]').value.trim() || null,
                            active: card.querySelector('[data-field="active"]').checked,
                        };
                        saveProduct(id, fields, card);
                    });
                });
            }

            async function loadProducts() {
                document.getElementById('products-area').innerHTML = '<div class="empty-state">Carregando produtos…</div>';
                try {
                    const { products } = await fetchProducts();
                    _allProducts = products;
                    renderProductsTab();
                } catch (err) {
                    document.getElementById('products-area').innerHTML = '<div class="empty-state">❌ ' + err.message + '</div>';
                }
            }

            // ── Auto-refresh ──────────────────────────────────────────────────────

            function startAutoRefresh() {
                clearInterval(_timer);
                _countdown = REFRESH_INTERVAL;
                _timer = setInterval(async () => {
                    _countdown--;
                    refreshCounter.innerHTML = `Auto-refresh em <span>${_countdown}s</span>`;
                    if (_countdown <= 0) {
                        _countdown = REFRESH_INTERVAL;
                        try {
                            const { orders } = await fetchOrders(_password);
                            const prevIds = new Set(_allOrders.map(o => o.id));
                            const newOnes = orders.filter(o => !prevIds.has(o.id));
                            _allOrders = orders;
                            renderKpis(_allOrders);
                            applyFiltersAndRender();
                            if (newOnes.length) showToast(`🛍️ ${newOnes.length} novo(s) pedido(s)!`);
                        } catch { /* silencioso — não interrompe o admin */ }
                    }
                }, 1000);
            }

            // ── Login / carregamento ──────────────────────────────────────────────

            async function loadPanel(password) {
                try {
                    const { orders } = await fetchOrders(password);
                    _allOrders = orders;
                    _password  = password;
                    renderKpis(_allOrders);
                    applyFiltersAndRender();
                    bindProductFilters();
                    loginScreen.style.display = 'none';
                    panelScreen.style.display = 'block';
                    sessionStorage.setItem(STORAGE_KEY, password);
                    startAutoRefresh();
                } catch (err) {
                    loginError.textContent = err.message || 'Não foi possível carregar o painel.';
                }
            }

            // ── Eventos ───────────────────────────────────────────────────────────

            function bindProductFilters() {
                const search = document.getElementById('product-search-input');
                const category = document.getElementById('product-category-filter');
                const status = document.getElementById('product-status-filter');
                if (!search || !category || !status) return;
                [search, category, status].forEach((el) => {
                    el.addEventListener('input', () => {
                        _productFilters = {
                            search: search.value,
                            category: category.value,
                            status: status.value,
                        };
                        renderProductsTab();
                    });
                });
            }

            document.getElementById('login-submit').addEventListener('click', () =>
                loadPanel(document.getElementById('admin-password-input').value));
            document.getElementById('admin-password-input').addEventListener('keydown', e =>
                { if (e.key==='Enter') document.getElementById('login-submit').click(); });
            document.getElementById('refresh-btn').addEventListener('click', async () => {
                if (!_password) return;
                const { orders } = await fetchOrders(_password);
                _allOrders = orders;
                renderKpis(_allOrders);
                applyFiltersAndRender();
                _countdown = REFRESH_INTERVAL;
                showToast('Pedidos atualizados.');
            });
            document.getElementById('export-csv-btn').addEventListener('click', exportCsv);
            document.getElementById('logout-btn').addEventListener('click', () => {
                clearInterval(_timer);
                sessionStorage.removeItem(STORAGE_KEY);
                location.reload();
            });
            searchInput.addEventListener('input', applyFiltersAndRender);
            statusFilter.addEventListener('change', applyFiltersAndRender);

            const saved = sessionStorage.getItem(STORAGE_KEY);
            if (saved) loadPanel(saved);
        </script>
    </body>
</html>
